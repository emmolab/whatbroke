name: release-artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to upload assets to (e.g. v0.3.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev
          python -m pip install --upgrade pip build

      - name: Build release artifacts
        run: ./build-packages.sh

      - name: Upload build artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: whatbroke-release-artifacts
          path: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.deb
            dist/*.rpm

      - name: Resolve target tag
        id: target
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git describe --tags --abbrev=0)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.target.outputs.tag }}" >/dev/null 2>&1 || \
          gh release create "${{ steps.target.outputs.tag }}" --title "${{ steps.target.outputs.tag }}" --generate-notes

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.target.outputs.tag }}" \
            dist/*.tar.gz \
            dist/*.whl \
            dist/*.deb \
            dist/*.rpm \
            --clobber
