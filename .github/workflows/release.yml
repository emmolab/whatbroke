name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build/release (for example v0.4.0)'
        required: true
        type: string
      ref:
        description: 'Git ref to check out (defaults to the tag when omitted)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target ref/tag
        id: target
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            tag="$PUSH_TAG"
            ref="refs/tags/${tag}"
          else
            tag="$INPUT_TAG"
            ref="$INPUT_REF"
            if [[ -z "$ref" ]]; then
              ref="$tag"
            fi
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Expected a version tag like v0.4.0, got: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.target.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev
          python -m pip install --upgrade pip build

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(python3 - <<'PY'
import pathlib, tomllib
data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
print(data['project']['version'])
PY
          )"
          expected_tag="v${package_version}"
          if [[ "$expected_tag" != "${{ steps.target.outputs.tag }}" ]]; then
            echo "Tag/version mismatch: workflow tag is ${{ steps.target.outputs.tag }}, but pyproject.toml says ${package_version}" >&2
            exit 1
          fi
          echo "Building release for ${expected_tag}"

      - name: Build release artifacts
        run: ./build-packages.sh

      - name: Upload build artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: whatbroke-${{ steps.target.outputs.tag }}
          path: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.deb
            dist/*.rpm

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.target.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              dist/*.tar.gz \
              dist/*.whl \
              dist/*.deb \
              dist/*.rpm \
              --clobber
          else
            gh release create "$TAG" \
              dist/*.tar.gz \
              dist/*.whl \
              dist/*.deb \
              dist/*.rpm \
              --verify-tag \
              --generate-notes \
              --title "$TAG"
          fi
